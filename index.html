<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ishan Gautam | 3D Portfolio</title>
    <meta name="description" content="Drive through Ishan Gautam's interactive 3D software engineering portfolio.">
    <meta name="author" content="Ishan Gautam">
    <meta name="theme-color" content="#101820">
    <meta property="og:title" content="Ishan Gautam | 3D Portfolio">
    <meta property="og:description" content="A gamified 3D portfolio for software engineering, IoT, data, and game projects.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://iamishan9.github.io/">
    <meta property="og:image" content="https://iamishan9.github.io/images/ishan1.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon-16x16.png">
    <link rel="manifest" href="./images/site.webmanifest">
    <link rel="stylesheet" href="./css/portfolio.css">
  </head>
  <body>
    <canvas id="world" aria-label="Interactive 3D portfolio world"></canvas>

    <div class="scene-shade" aria-hidden="true"></div>

    <header class="topbar">
      <a class="brand" href="#about" data-station-link="about" aria-label="Open the about area">
        <span class="brand-mark" aria-hidden="true">
          <img src="./images/ishan1.jpg" alt="">
        </span>
        <span>
          <strong>Ishan Gautam</strong>
          <small>Software engineer in France</small>
        </span>
      </a>

      <nav class="station-nav" aria-label="Portfolio areas">
        <a href="#about" data-station-link="about">About</a>
        <a href="#skills" data-station-link="skills">Skills</a>
        <a href="#experience" data-station-link="experience">Experience</a>
        <a href="#projects" data-station-link="projects">Projects</a>
        <a href="#contact" data-station-link="contact">Contact</a>
      </nav>
    </header>

    <main class="content-panel" id="content-panel" aria-live="polite">
      <div class="panel-heading">
        <div>
          <p id="panel-kicker">Launch Pad</p>
          <h1 id="panel-title">Bonjour, I'm Ishan.</h1>
        </div>
        <button
          class="panel-toggle"
          id="panel-toggle"
          type="button"
          aria-label="Hide info panel"
          aria-controls="panel-body"
          aria-expanded="true"
          title="Hide info panel"
        ></button>
      </div>
      <div id="panel-body" class="panel-body">
        <p>
          A software engineer based in France, building across web platforms, IoT,
          machine learning, mobile apps, and game experiments.
        </p>
      </div>
      <div id="panel-actions" class="panel-actions"></div>
    </main>

    <section class="mini-map" aria-label="World map">
      <button type="button" data-station-link="about" aria-label="About area"></button>
      <button type="button" data-station-link="skills" aria-label="Skills area"></button>
      <button type="button" data-station-link="experience" aria-label="Experience area"></button>
      <button type="button" data-station-link="projects" aria-label="Projects area"></button>
      <button type="button" data-station-link="contact" aria-label="Contact area"></button>
    </section>

    <div class="touch-controls" aria-label="Driving controls">
      <button type="button" data-control="forward" aria-label="Forward">^</button>
      <button type="button" data-control="left" aria-label="Left">&lt;</button>
      <button type="button" data-control="right" aria-label="Right">&gt;</button>
      <button type="button" data-control="backward" aria-label="Backward">v</button>
    </div>

    <noscript>
      <section class="noscript">
        <h1>Ishan Gautam</h1>
        <p>Software engineer based in France.</p>
        <p>
          GitHub: <a href="https://github.com/iamishan9">iamishan9</a>,
          LinkedIn: <a href="https://www.linkedin.com/in/iamishan/">iamishan</a>,
          Email: <a href="mailto:iamishan9@gmail.com">iamishan9@gmail.com</a>
        </p>
      </section>
    </noscript>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./js/portfolio.js"></script>
  </body>
</html>
